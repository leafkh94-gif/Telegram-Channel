services:
  - type: web
    name: gold-alert-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements-alerts.txt
    startCommand: python sweep_alert_agent.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ENVIRONMENT
        value: development
